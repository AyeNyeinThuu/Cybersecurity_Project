<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishing Email Detector</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Phishing Email Detection System</h1>

        <form method="POST">
            <textarea name="email_text" rows="12" placeholder="Paste email message here...">{{ user_text }}</textarea>
            <button type="submit">Analyze Email</button>
        </form>

        {% if prediction %}
        <div class="result-box">
            <h2>Prediction Result</h2>
            <p><strong>Class:</strong> {{ prediction }}</p>
            <p><strong>Confidence:</strong> {{ confidence }}%</p>
        </div>
        {% endif %}

        {% if lime_html %}
        <div class="lime-box">
            <h2>LIME Explanation</h2>
            <div class="lime-wrapper">
                {{ lime_html | safe }}
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
